<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'트리링크 - ' + ${companyDetail.companyName}">트리링크 - 업체 정보</title>
  <th:block th:replace="~{/common/fragment :: common}"></th:block>
  <th:block sec:authorize="hasRole('ADMIN')">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@latest/dist/summernote-lite.min.css">
  </th:block>

  <link rel="stylesheet" th:href="@{/css/company/view/main.css}">
  <link rel="stylesheet" th:href="@{/css/company/view/intro.css}">
</head>

<body>

  <div class="cv-page-wrapper">

    <!-- ============================
         상단 고정 영역: 로고 + 로고 업로드
         ============================ -->
    <div class="cv-header-area">
      <div class="cv-logo-wrap">
        <img id="cv-company-logo" th:attr="data-logo-url=@{/file/company/{no}/logo(no=${companyDetail.encryptedCompanyNo})},
                      data-fallback-url=@{/img/main-logo.png}" src="/img/main-logo.png" alt="업체 로고"
          class="cv-company-logo">

        <!-- ADMIN 전용: 로고 업로드 버튼 -->
        <div sec:authorize="hasRole('ADMIN')" class="cv-logo-upload-wrap">
          <button type="button" class="cv-btn cv-btn-outline cv-btn-sm" id="cv-logo-upload-btn">
            <i data-lucide="upload"></i>
            로고 업로드
          </button>
          <!-- 숨겨진 파일 입력 -->
          <input type="file" id="cv-logo-file-input" accept="image/jpeg,image/png,image/gif,image/webp"
            style="display:none">
          <!-- 업로드 확인 영역 (파일 선택 후 표시) -->
          <div id="cv-logo-confirm-area" style="display:none" class="cv-logo-confirm-area">
            <span id="cv-logo-file-name" class="cv-text-muted cv-text-sm"></span>
            <button type="button" class="cv-btn cv-btn-primary cv-btn-sm" id="cv-logo-confirm-btn"
              th:attr="data-encrypted-no=${companyDetail.encryptedCompanyNo}">
              업로드 확인
            </button>
            <button type="button" class="cv-btn cv-btn-ghost cv-btn-sm" id="cv-logo-cancel-btn">취소</button>
          </div>
        </div>
      </div>

      <!-- ============================
           네비 바
           ============================ -->
      <nav class="cv-nav">
        <button type="button" class="cv-nav-item" th:classappend="${companyMenu == 'basic'} ? ' active' : ''"
          th:attr="data-encrypted-no=${companyDetail.encryptedCompanyNo}" id="cv-nav-basic">
          <i data-lucide="info"></i>
          기본 정보
        </button>
        <button type="button" class="cv-nav-item" th:classappend="${companyMenu == 'intro'} ? ' active' : ''"
          th:attr="data-url=@{/company/{no}/intro(no=${companyDetail.encryptedCompanyNo})}" data-menu="intro">
          <i data-lucide="file-text"></i>
          업체 소개
        </button>
        <button type="button" class="cv-nav-item" th:classappend="${companyMenu == 'evaluation'} ? ' active' : ''"
          th:attr="data-url=@{/evaluation/{no}(no=${companyDetail.encryptedCompanyNo})}" data-menu="evaluation">
          <i data-lucide="star"></i>
          평가 보기
        </button>
        <button type="button" class="cv-nav-item" th:classappend="${companyMenu == 'location'} ? ' active' : ''"
          th:attr="data-url=@{/company/{no}/location(no=${companyDetail.encryptedCompanyNo})}" data-menu="location">
          <i data-lucide="map-pin"></i>
          위치 보기
        </button>
        <button type="button" class="cv-nav-item" th:classappend="${companyMenu == 'dashboard'} ? ' active' : ''"
          th:attr="data-url=@{/company/{no}/dashboard(no=${companyDetail.encryptedCompanyNo})}" data-menu="dashboard">
          <i data-lucide="layout-dashboard"></i>
          작업 현황
        </button>
      </nav>
    </div>

    <!-- ============================
         네비 바 아래 조각 영역
         ============================ -->
    <div id="cv-content-area">

      <!-- ========================================
           기본 정보 조각 (인라인 삽입)
           ======================================== -->
      <div id="main-basic-info">

        <!-- 기본 정보 카드 -->
        <div class="cv-info-card">
          <div class="cv-card-header">
            <h2 class="cv-card-title">
              <i data-lucide="building-2"></i>
              업체 기본 정보
            </h2>

            <!-- ADMIN: 수정하기 버튼 -->
            <button sec:authorize="hasRole('ADMIN')" type="button" class="cv-btn cv-btn-primary cv-btn-sm"
              id="cv-edit-open-btn">
              <i data-lucide="pencil"></i>
              수정하기
            </button>
          </div>

          <dl class="cv-info-list">
            <!-- 업체명 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">업체명</dt>
              <dd class="cv-info-value" th:text="${companyDetail.companyName}">—</dd>
            </div>
            <!-- 사업자 등록번호 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">사업자 등록번호</dt>
              <dd class="cv-info-value" th:text="${#strings.substring(companyDetail.businessNo,0,3) + '-'
                           + #strings.substring(companyDetail.businessNo,3,5) + '-'
                           + #strings.substring(companyDetail.businessNo,5)}">—</dd>
            </div>
            <!-- 대표 이름 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">대표 이름</dt>
              <dd class="cv-info-value" th:text="${companyDetail.representativeName}">—</dd>
            </div>
            <!-- 연락처 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">연락처</dt>
              <dd class="cv-info-value" th:text="${companyDetail.phone}">—</dd>
            </div>
            <!-- 이메일 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">이메일</dt>
              <dd class="cv-info-value" th:text="${companyDetail.email}">—</dd>
            </div>
            <!-- 창립일 -->
            <div class="cv-info-row">
              <dt class="cv-info-label">창립일</dt>
              <dd class="cv-info-value" th:text="${#temporals.format(companyDetail.createdOn, 'yyyy년 MM월 dd일')}">—</dd>
            </div>
            <!-- 주 종목 -->
            <div class="cv-info-row cv-info-row--top">
              <dt class="cv-info-label">주 종목</dt>
              <dd class="cv-info-value">
                <div class="cv-option-list">
                  <th:block th:each="opt : ${companyDetail.option}">
                    <span class="cv-option-tag" th:text="${opt == '기타' and companyDetail.etcMemo != null}
                                    ? '기타 - ' + ${companyDetail.etcMemo}
                                    : ${opt}">
                    </span>
                  </th:block>
                  <span th:if="${companyDetail.option == null or #lists.isEmpty(companyDetail.option)}"
                    class="cv-text-muted cv-text-sm">없음</span>
                </div>
              </dd>
            </div>
            <!-- ADMIN 전용: 상태 -->
            <div sec:authorize="hasRole('ADMIN')" class="cv-info-row">
              <dt class="cv-info-label">상태</dt>
              <dd class="cv-info-value">
                <span class="cv-status-badge" th:classappend="${companyDetail.status.name() == 'ACTIVE'} ? ' status-active'
                  : (${companyDetail.status.name() == 'SUSPENDED'} ? ' status-suspended'
                  : ' status-terminated')" th:text="${companyDetail.status.name() == 'ACTIVE'} ? '정상'
                  : (${companyDetail.status.name() == 'SUSPENDED'} ? '정지' : '종료')">
                </span>
              </dd>
            </div>
          </dl>
        </div><!-- /.cv-info-card -->

        <!-- ========================================
             ADMIN: 서류 등록 + 서류 목록
             ======================================== -->
        <div sec:authorize="hasRole('ADMIN')" class="cv-doc-section">

          <!-- 서류 등록 버튼 -->
          <button type="button" class="cv-btn cv-btn-outline cv-btn-sm" id="cv-doc-register-btn">
            <i data-lucide="file-plus"></i>
            서류 등록
          </button>

          <!-- 서류 등록 폼 (숨김) -->
          <div id="cv-doc-form-area" style="display:none" class="cv-doc-form-area">
            <div class="cv-doc-form-inner">
              <div class="cv-form-group">
                <label class="cv-form-label">첨부 파일 <span class="cv-required">*</span></label>
                <input type="file" id="cv-doc-file-input" class="cv-form-control">
              </div>
              <div class="cv-form-group">
                <label class="cv-form-label" for="cv-doc-type-select">서류 종류 <span class="cv-required">*</span></label>
                <select id="cv-doc-type-select" class="cv-form-control">
                  <option value="">직접 입력</option>
                  <option value="BANKBOOK">통장 사본</option>
                </select>
                <input type="text" id="cv-doc-type-input" class="cv-form-control" placeholder="20자 이내" maxlength="20"
                  style="margin-top: var(--space-2);">
              </div>
              <div class="cv-form-group">
                <label class="cv-form-label">만료일 <span class="cv-text-muted">(선택)</span></label>
                <div class="cv-date-row">
                  <input type="number" id="cv-doc-expire-year" class="cv-form-control cv-date-part" placeholder="YYYY"
                    min="2000" max="2999">
                  <span class="cv-date-sep">년</span>
                  <input type="number" id="cv-doc-expire-month" class="cv-form-control cv-date-part" placeholder="MM"
                    min="1" max="12">
                  <span class="cv-date-sep">월</span>
                  <input type="number" id="cv-doc-expire-day" class="cv-form-control cv-date-part" placeholder="DD"
                    min="1" max="31">
                  <span class="cv-date-sep">일</span>
                </div>
              </div>

              <div class="cv-form-btns">
                <button type="button" class="cv-btn cv-btn-primary cv-btn-sm" id="cv-doc-upload-btn"
                  th:attr="data-encrypted-no=${companyDetail.encryptedCompanyNo}">
                  업로드
                </button>
                <button type="button" class="cv-btn cv-btn-ghost cv-btn-sm" id="cv-doc-cancel-btn">취소</button>
              </div>
            </div>
          </div>

          <!-- 서류 목록 -->
          <div class="cv-doc-list-wrap" th:if="${companyDocs != null and not #lists.isEmpty(companyDocs)}">
            <h3 class="cv-section-title">서류 목록</h3>
            <div class="cv-doc-list">
              <div class="cv-doc-item" th:each="doc : ${companyDocs}" th:attr="data-encrypted-file-no=${doc.encryptedFileNo},
                            data-encrypted-no=${companyDetail.encryptedCompanyNo}">
                <div class="cv-doc-item-info">
                  <div class="cv-doc-name">
                    <i data-lucide="file"></i>
                    <span th:text="${doc.originalName}">파일명</span>
                  </div>
                  <div class="cv-doc-meta">
                    <span class="cv-doc-type-badge"
                      th:text="${doc.docType == 'BANKBOOK'} ? '통장 사본' : ${doc.docType}">종류</span>
                    <span class="cv-text-muted cv-text-sm"
                      th:text="${#numbers.formatDecimal(doc.fileSize / 1024.0, 1, 'COMMA', 1, 'POINT')} + ' KB'">
                    </span>
                    <span class="cv-text-muted cv-text-sm" th:if="${doc.expireOn != null}"
                      th:text="'만료: ' + ${#temporals.format(doc.expireOn, 'yyyy년 MM월 dd일')}">
                    </span>
                  </div>
                </div>
                <button type="button" class="cv-btn cv-btn-danger cv-btn-xs cv-doc-delete-btn" th:attr="data-encrypted-file-no=${doc.encryptedFileNo},
                                 data-encrypted-no=${companyDetail.encryptedCompanyNo}">
                  <i data-lucide="trash-2"></i>
                  삭제
                </button>
              </div>
            </div>
          </div>
          <div th:if="${companyDocs == null or #lists.isEmpty(companyDocs)}"
            class="cv-empty-state cv-text-muted cv-text-sm">
            등록된 서류가 없습니다.
          </div>
        </div><!-- /.cv-doc-section -->

      </div><!-- /#main-basic-info -->

    </div><!-- /#cv-content-area -->
  </div><!-- /.cv-page-wrapper -->


  <!-- ========================================
       ADMIN: 업체 정보 수정 모달
       ======================================== -->
  <div sec:authorize="hasRole('ADMIN')" id="cv-edit-modal" class="cv-modal-backdrop" style="display:none" role="dialog"
    aria-modal="true" aria-labelledby="cv-edit-modal-title">
    <div class="cv-modal">
      <div class="cv-modal-header">
        <h3 class="cv-modal-title" id="cv-edit-modal-title">업체 정보 수정</h3>
        <button type="button" class="cv-modal-close" id="cv-edit-modal-close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="cv-modal-body">
        <form id="cv-edit-form" th:attr="data-encrypted-no=${companyDetail.encryptedCompanyNo}">

          <!-- 업체명 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-companyName">업체명 <span class="cv-required">*</span></label>
            <input type="text" id="cv-edit-companyName" name="companyName" class="cv-form-control"
              th:value="${companyDetail.companyName}" placeholder="업체명">
            <div class="cv-form-error" id="cv-err-companyName"></div>
          </div>

          <!-- 사업자 등록번호 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-businessNo">사업자 등록번호 <span class="cv-required">*</span></label>
            <input type="text" id="cv-edit-businessNo" name="businessNo" class="cv-form-control"
              th:value="${companyDetail.businessNo}" placeholder="숫자 10자리">
            <div class="cv-form-error" id="cv-err-businessNo"></div>
          </div>

          <!-- 대표 이름 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-representativeName">대표 이름 <span
                class="cv-required">*</span></label>
            <input type="text" id="cv-edit-representativeName" name="representativeName" class="cv-form-control"
              th:value="${companyDetail.representativeName}" placeholder="대표 이름">
            <div class="cv-form-error" id="cv-err-representativeName"></div>
          </div>

          <!-- 연락처 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-phone">연락처 <span class="cv-required">*</span></label>
            <input type="text" id="cv-edit-phone" name="phone" class="cv-form-control" th:value="${companyDetail.phone}"
              placeholder="숫자만">
            <div class="cv-form-error" id="cv-err-phone"></div>
          </div>

          <!-- 이메일 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-email">이메일</label>
            <input type="text" id="cv-edit-email" name="email" class="cv-form-control" th:value="${companyDetail.email}"
              placeholder="example@email.com">
            <div class="cv-form-error" id="cv-err-email"></div>
          </div>

          <!-- 창립일 (year / month / day 분리) -->
          <div class="cv-form-group">
            <label class="cv-form-label">창립일 <span class="cv-required">*</span></label>
            <div class="cv-date-row">
              <input type="number" id="cv-edit-year" class="cv-form-control cv-date-part" placeholder="YYYY"
                th:value="${#temporals.year(companyDetail.createdOn)}" min="1900" max="2099">
              <span class="cv-date-sep">년</span>
              <input type="number" id="cv-edit-month" class="cv-form-control cv-date-part" placeholder="MM"
                th:value="${#temporals.month(companyDetail.createdOn)}" min="1" max="12">
              <span class="cv-date-sep">월</span>
              <input type="number" id="cv-edit-day" class="cv-form-control cv-date-part" placeholder="DD"
                th:value="${#temporals.day(companyDetail.createdOn)}" min="1" max="31">
              <span class="cv-date-sep">일</span>
            </div>
            <div class="cv-form-error" id="cv-err-createdOn"></div>
          </div>

          <!-- 주 종목 (체크박스) -->
          <div class="cv-form-group">
            <label class="cv-form-label">주 종목 <span class="cv-text-muted">(최대 3개)</span></label>
            <div class="cv-specialty-list">
              <label class="cv-specialty-item" th:each="spec : ${ {
                  {no: 1,  field: '벌초'},
                  {no: 2,  field: '운동장 / 스포츠'},
                  {no: 3,  field: '공공기관 유지관리'},
                  {no: 4,  field: '정원'},
                  {no: 5,  field: '실내조경'},
                  {no: 6,  field: '조경시설물'},
                  {no: 99, field: '기타'}
              } }">
                <input type="checkbox" name="option" class="cv-specialty-check" th:value="${spec.no}"
                  th:checked="${companyDetail.option != null and #lists.contains(companyDetail.option, spec.field)}"
                  th:attr="data-field=${spec.field}">
                <span th:text="${spec.field}">종목</span>
              </label>
            </div>
            <div class="cv-form-error" id="cv-err-option"></div>
          </div>

          <!-- 기타 메모 (기타 선택 시 표시) -->
          <div class="cv-form-group" id="cv-edit-etcMemo-wrap"
            th:style="${companyDetail.option != null and #lists.contains(companyDetail.option, '기타')} ? '' : 'display:none'">
            <label class="cv-form-label" for="cv-edit-etcMemo">기타 내용 <span class="cv-required">*</span></label>
            <input type="text" id="cv-edit-etcMemo" name="etcMemo" class="cv-form-control"
              th:value="${companyDetail.etcMemo}" placeholder="20자 이내" maxlength="20">
            <div class="cv-form-error" id="cv-err-etcMemo"></div>
          </div>

          <!-- 상태 -->
          <div class="cv-form-group">
            <label class="cv-form-label" for="cv-edit-status">상태 <span class="cv-required">*</span></label>
            <select id="cv-edit-status" name="status" class="cv-form-control">
              <option value="ACTIVE" th:selected="${companyDetail.status.name() == 'ACTIVE'}">정상</option>
              <option value="SUSPENDED" th:selected="${companyDetail.status.name() == 'SUSPENDED'}">정지</option>
              <option value="TERMINATED" th:selected="${companyDetail.status.name() == 'TERMINATED'}">종료</option>
            </select>
          </div>

        </form>
      </div>
      <div class="cv-modal-footer">
        <button type="button" class="cv-btn cv-btn-ghost" id="cv-edit-cancel-btn">취소</button>
        <button type="button" class="cv-btn cv-btn-primary" id="cv-edit-submit-btn">수정 확인</button>
      </div>
    </div>
  </div><!-- /#cv-edit-modal -->


  <script>
    lucide.createIcons();
  </script>
  <th:block sec:authorize="hasRole('ADMIN')">
    <script src="https://cdn.jsdelivr.net/npm/summernote@latest/dist/summernote-lite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@latest/dist/lang/summernote-ko-KR.min.js"></script>
  </th:block>

  <script th:src="@{/js/company/view/main.js}"></script>
</body>

</html>
