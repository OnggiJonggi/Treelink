<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'트리링크 - ' + ${companyDetail.companyName}">트리링크 - 회사명</title>
  <th:block th:replace="~{/common/fragment :: common}"></th:block>
  <link rel="stylesheet" th:href="@{/css/company/view/main.css}">
</head>

<body>

  <!-- 페이지 헤더 : 회사 이름 -->
  <div id="basic-page-header">
    <h1 id="basic-company-name" th:text="${companyDetail.companyName}">회사 이름</h1>
  </div>

  <!-- 네비 바 -->
  <nav id="basic-company-nav" aria-label="업체 상세 메뉴">
    <div id="basic-nav-inner">
      <a id="basic-nav-basic" th:href="@{/company/{uuid}(uuid=${companyDetail.companyUuid})}" class="basic-nav-item"
        th:classappend="${companyMenu == 'basic'} ? ' is-active' : ''">
        <i data-lucide="building-2"></i>
        기본 정보
      </a>
      <a id="basic-nav-evaluation" href="javascript:void(0)" class="basic-nav-item"
        th:classappend="${companyMenu == 'evaluation'} ? ' is-active' : ''"
        th:data-url="@{/evaluation/{uuid}(uuid=${companyDetail.companyUuid})}" data-target="basic-content-area"
        onclick="basicLoadFragment(this)">
        <i data-lucide="star"></i>
        평가 보기
      </a>
      <a id="basic-nav-location" href="javascript:void(0)" class="basic-nav-item"
        th:classappend="${companyMenu == 'location'} ? ' is-active' : ''"
        th:data-url="@{/company/{uuid}/location(uuid=${companyDetail.companyUuid})}" data-target="basic-content-area"
        onclick="basicLoadFragment(this)">
        <i data-lucide="map-pin"></i>
        위치 보기
      </a>
      <a id="basic-nav-dashboard" href="javascript:void(0)" class="basic-nav-item"
        th:classappend="${companyMenu == 'dashboard'} ? ' is-active' : ''"
        th:data-url="@{/company/{uuid}/dashboard(uuid=${companyDetail.companyUuid})}" data-target="basic-content-area"
        onclick="basicLoadFragment(this)">
        <i data-lucide="layout-dashboard"></i>
        작업 현황
      </a>
    </div>
  </nav>

  <!-- 네비 하단 콘텐츠 영역 -->
  <main id="basic-content-area">

    <!-- 기본 정보 섹션 -->
    <section id="basic-info-section">
      <div id="basic-info-fields">

        <!-- 사업자 등록번호 -->
        <div id="basic-field-businessNo" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="hash"></i>
            사업자 등록번호
          </span>
          <span id="basic-val-businessNo" class="basic-field-value" th:text="${#strings.substring(companyDetail.businessNo,0,3) + '-'
                          + #strings.substring(companyDetail.businessNo,3,5) + '-'
                          + #strings.substring(companyDetail.businessNo,5,10)}">
            000-00-00000
          </span>
          <input id="basic-inp-businessNo" type="text" class="basic-edit-input" style="display:none" maxlength="10"
            placeholder="숫자 10자리" th:value="${companyDetail.businessNo}" autocomplete="off">
          <p class="basic-field-error" id="basic-err-businessNo"></p>
        </div>

        <!-- 대표 이름 -->
        <div id="basic-field-representativeName" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="user"></i>
            대표 이름
          </span>
          <span id="basic-val-representativeName" class="basic-field-value"
            th:text="${companyDetail.representativeName}">홍길동</span>
          <input id="basic-inp-representativeName" type="text" class="basic-edit-input" style="display:none"
            maxlength="10" placeholder="대표 이름" th:value="${companyDetail.representativeName}" autocomplete="off">
          <p class="basic-field-error" id="basic-err-representativeName"></p>
        </div>

        <!-- 대표 연락처 -->
        <div id="basic-field-phone" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="phone"></i>
            대표 연락처
          </span>
          <span id="basic-val-phone" class="basic-field-value" th:text="${companyDetail.phone}">01000000000</span>
          <input id="basic-inp-phone" type="text" class="basic-edit-input" style="display:none" maxlength="15"
            placeholder="숫자만 입력" th:value="${companyDetail.phone}" autocomplete="off">
          <p class="basic-field-error" id="basic-err-phone"></p>
        </div>

        <!-- 이메일 -->
        <div id="basic-field-email" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="mail"></i>
            이메일
          </span>
          <span id="basic-val-email" class="basic-field-value"
            th:text="${companyDetail.email != null ? companyDetail.email : '-'}">-</span>
          <input id="basic-inp-email" type="text" class="basic-edit-input" style="display:none" maxlength="100"
            placeholder="이메일 (선택)" th:value="${companyDetail.email}" autocomplete="off">
          <p class="basic-field-error" id="basic-err-email"></p>
        </div>

        <!-- 회사 창립일 -->
        <div id="basic-field-createdOn" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="calendar"></i>
            회사 창립일
          </span>
          <span id="basic-val-createdOn" class="basic-field-value"
            th:text="${#temporals.format(companyDetail.createdOn, 'yyyy년 MM월 dd일')}">
            2020년 01월 01일
          </span>
          <input id="basic-inp-createdOn" type="date" class="basic-edit-input" style="display:none"
            th:value="${#temporals.format(companyDetail.createdOn, 'yyyy-MM-dd')}">
          <p class="basic-field-error" id="basic-err-createdOn"></p>
        </div>

        <!-- 주 종목 -->
        <div id="basic-field-option" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="list-checks"></i>
            주 종목
          </span>
          <!-- 표시 모드 -->
          <div id="basic-val-option" class="basic-option-chips">
            <th:block th:each="opt : ${companyDetail.option}">
              <span class="basic-option-chip" th:if="${opt == '기타'}"
                th:text="${'기타' + (companyDetail.etcMemo != null ? ' - ' + companyDetail.etcMemo : '')}">기타</span>
              <span class="basic-option-chip" th:unless="${opt == '기타'}" th:text="${opt}">종목</span>
            </th:block>
          </div>
          <!-- 수정 모드 -->
          <div id="basic-edit-option" class="basic-edit-option-wrap" style="display:none">
            <div class="basic-option-grid" id="basic-option-grid">
              <label class="basic-option-chip-edit" data-value="1">
                <input type="checkbox" class="basic-option-check" value="1"> 벌초
              </label>
              <label class="basic-option-chip-edit" data-value="2">
                <input type="checkbox" class="basic-option-check" value="2"> 운동장 / 스포츠
              </label>
              <label class="basic-option-chip-edit" data-value="3">
                <input type="checkbox" class="basic-option-check" value="3"> 공공기관 유지관리
              </label>
              <label class="basic-option-chip-edit" data-value="4">
                <input type="checkbox" class="basic-option-check" value="4"> 정원
              </label>
              <label class="basic-option-chip-edit" data-value="5">
                <input type="checkbox" class="basic-option-check" value="5"> 실내조경
              </label>
              <label class="basic-option-chip-edit" data-value="6">
                <input type="checkbox" class="basic-option-check" value="6"> 조경시설물
              </label>
              <label class="basic-option-chip-edit basic-option-chip-etc" data-value="99">
                <input type="checkbox" class="basic-option-check" value="99" id="basic-opt-etc"> 기타
              </label>
            </div>
            <p class="basic-field-error" id="basic-err-option"></p>
            <div id="basic-etc-memo-wrap" style="display:none">
              <input type="text" id="basic-inp-etcMemo" class="basic-edit-input" maxlength="20"
                placeholder="기타 종목을 입력하세요 (최대 20자)" autocomplete="off" th:value="${companyDetail.etcMemo}">
              <p class="basic-field-error" id="basic-err-etcMemo"></p>
            </div>
          </div>
        </div>

        <!-- 상태 (ADMIN only) -->
        <div sec:authorize="hasRole('ADMIN')" id="basic-field-status" class="basic-field-row">
          <span class="basic-field-label">
            <i data-lucide="activity"></i>
            상태
          </span>
          <span id="basic-val-status" class="basic-status-badge" th:classappend="${companyDetail.status == 'ACTIVE'} ? ' status-active'
                               : (${companyDetail.status == 'SUSPENDED'} ? ' status-suspended' : ' status-terminated')"
            th:text="${companyDetail.status == 'ACTIVE'} ? '정상'
                         : (${companyDetail.status == 'SUSPENDED'} ? '정지' : '종료')">정상</span>
          <select id="basic-inp-status" class="basic-edit-input basic-edit-select" style="display:none">
            <option value="ACTIVE" th:selected="${companyDetail.status == 'ACTIVE'}">정상 (ACTIVE)</option>
            <option value="SUSPENDED" th:selected="${companyDetail.status == 'SUSPENDED'}">정지 (SUSPENDED)</option>
            <option value="TERMINATED" th:selected="${companyDetail.status == 'TERMINATED'}">종료 (TERMINATED)</option>
          </select>
        </div>

        <!-- 수정 / 저장 / 취소 버튼 (ADMIN only) -->
        <div sec:authorize="hasRole('ADMIN')" id="basic-edit-action-area">
          <button id="basic-btn-edit" class="basic-icon-btn" type="button" onclick="basicEnterEditMode()">
            <i data-lucide="pencil"></i>
            수정
          </button>
          <div id="basic-edit-controls" style="display:none">
            <button id="basic-btn-save" class="basic-btn basic-btn-primary" type="button" onclick="basicSaveEdit()">
              <i data-lucide="save"></i>
              저장
            </button>
            <button id="basic-btn-cancel" class="basic-btn basic-btn-outline" type="button" onclick="basicCancelEdit()">
              <i data-lucide="x"></i>
              취소
            </button>
          </div>
          <p class="basic-field-error" id="basic-err-save"></p>
        </div>

      </div>
    </section>

    <!-- 업체 서류 영역 (ADMIN only) -->
    <section sec:authorize="hasRole('ADMIN')" id="basic-docs-section">
      <div id="basic-docs-header">
        <h2 id="basic-docs-title">
          <i data-lucide="folder-open"></i>
          업체 서류
        </h2>
        <button id="basic-btn-new-doc" class="basic-btn basic-btn-primary" type="button"
          onclick="basicToggleDocUpload()">
          <i data-lucide="plus"></i>
          새로운 서류 등록
        </button>
      </div>

      <!-- 서류 업로드 폼 -->
      <div id="basic-doc-upload-form" style="display:none">
        <div id="basic-doc-upload-inner">
          <div class="basic-field-row">
            <label class="basic-field-label" for="basic-doc-type-input">
              <i data-lucide="tag"></i>
              서류 종류 <span class="basic-required">*</span>
            </label>
            <input type="text" id="basic-doc-type-input" class="basic-edit-input" maxlength="20"
              placeholder="서류 종류 입력 (최대 20자)" autocomplete="off">
            <p class="basic-field-error" id="basic-err-docType"></p>
          </div>
          <div class="basic-field-row">
            <label class="basic-field-label" for="basic-doc-expire-input">
              <i data-lucide="calendar-x"></i>
              만료일 <span class="basic-optional">(선택)</span>
            </label>
            <input type="date" id="basic-doc-expire-input" class="basic-edit-input">
            <p class="basic-field-error" id="basic-err-docExpire"></p>
          </div>
          <div class="basic-field-row">
            <label class="basic-field-label" for="basic-doc-file-input">
              <i data-lucide="paperclip"></i>
              파일 <span class="basic-required">*</span>
            </label>
            <input type="file" id="basic-doc-file-input" class="basic-edit-input basic-file-input"
              onchange="basicOnFileSelected()">
          </div>
          <div id="basic-doc-upload-btn-area" style="display:none">
            <button id="basic-btn-upload-doc" class="basic-btn basic-btn-primary" type="button"
              onclick="basicUploadDoc()">
              <i data-lucide="upload"></i>
              업로드
            </button>
          </div>
          <p class="basic-field-error" id="basic-err-upload"></p>
        </div>
      </div>

      <!-- 서류 목록 -->
      <div id="basic-docs-list">
        <th:block th:if="${docs != null and !#lists.isEmpty(docs)}">
          <div class="basic-doc-card" th:each="doc : ${docs}"
            th:attr="data-encrypted-no=${doc.encryptedFileNo}, data-company-uuid=${companyDetail.companyUuid}">
            <div class="basic-doc-card-meta">
              <div class="basic-doc-badge" th:text="${doc.docType}">서류 유형</div>
              <div class="basic-doc-info-row">
                <span class="basic-doc-info-label"><i data-lucide="file-text"></i></span>
                <span class="basic-doc-info-value" th:text="${doc.originalName}">파일명.pdf</span>
              </div>
              <div class="basic-doc-info-row">
                <span class="basic-doc-info-label"><i data-lucide="hard-drive"></i></span>
                <span class="basic-doc-info-value"
                  th:text="${#numbers.formatDecimal(doc.fileSize / 1024.0, 1, 1) + ' KB'}">0 KB</span>
              </div>
              <div class="basic-doc-info-row">
                <span class="basic-doc-info-label"><i data-lucide="clock"></i></span>
                <span class="basic-doc-info-value"
                  th:text="${#temporals.format(doc.savedAt, 'yyyy년 MM월 dd일 hh:mm:ss')}">
                  2024년 01월 01일 12:00:00
                </span>
              </div>
              <div class="basic-doc-info-row" th:if="${doc.expireOn != null}">
                <span class="basic-doc-info-label"><i data-lucide="calendar-x"></i></span>
                <span class="basic-doc-info-value" th:text="${#temporals.format(doc.expireOn, 'yyyy년 MM월 dd일')}">
                  2025년 12월 31일
                </span>
              </div>
            </div>
            <div class="basic-doc-card-actions">
              <button class="basic-btn basic-btn-outline basic-btn-sm" type="button" onclick="basicViewDoc(this)">
                <i data-lucide="eye"></i>
                서류 보기
              </button>
              <button class="basic-btn basic-btn-danger basic-btn-sm" type="button" onclick="basicDeleteDoc(this)">
                <i data-lucide="trash-2"></i>
                서류 삭제
              </button>
            </div>
          </div>
        </th:block>
        <div id="basic-docs-empty" th:if="${docs == null or #lists.isEmpty(docs)}" class="basic-empty-state">
          <i data-lucide="folder-open"></i>
          <p>등록된 서류가 없습니다.</p>
        </div>
      </div>
    </section>

    <!-- hidden 값들 (JS용) -->
    <input type="hidden" id="basic-hidden-companyUuid" th:value="${companyDetail.companyUuid}">
    <input type="hidden" id="basic-hidden-options"
      th:value="${companyDetail.option != null ? #strings.listJoin(companyDetail.option, ',') : ''}">

  </main>

  <script th:src="@{/js/company/view/main.js}"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
